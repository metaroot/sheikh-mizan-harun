aboutMe:
  name: মীযান হারুনের
  title: আকীদাহ ত্বহাবিয়ার এর উপর এম ফিল 
  bio: উস্তাদ মীযান হারুনের সম্পর্ক এখানে জানতে পারবেন
  long_summary_title: উস্তাদের সম্পর্কে
  long_summary: সবার আগে ঈমান। সচেতন মুসলিম মানেই তা সহজে উপলব্ধি করে থাকে। আর এই ঈমানের আলোচনা আকীদা শাস্ত্রে হয়ে থাকে। আকীদার উপর উচ্চতর পড়াশোনা করা এবং গবেষক আলেম হচ্ছেন উস্তাজ মীযান হারুন। বর্তমানে এম.ফিল গবেষক হিসেবে আছেন কিং সৌদ ইউনিভার্সিটিতে। 
  
  hashtags: 
    - '#কুরআন 
    - '#হাদীস'
    - '#উসুলে_ফিকহ'
    - '#আকীদাহ'
